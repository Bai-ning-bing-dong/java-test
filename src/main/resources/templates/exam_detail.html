<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>考试答题</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h4 class="mb-4">答题页面</h4>
    <form method="post" action="/student/exam/submit">
        <input type="hidden" name="examId" th:value="${examId}">

        <div th:each="q, i : ${questions}" class="card mb-3">
            <div class="card-body">
                <p class="fw-bold">
                    <span th:text="${i.index + 1}"></span>.
                    <span th:text="${q.content}"></span>
                    <span class="text-muted fs-6">（<span th:text="${q.score}"></span>分）</span>
                </p>
                <div class="ms-3">
                    <div class="form-check" th:if="${q.optionA != null}">
                        <input class="form-check-input" type="radio"
                               th:name="'answer_' + ${q.questionId}" value="A">
                        <label class="form-check-label">A. <span th:text="${q.optionA}"></span></label>
                    </div>
                    <div class="form-check" th:if="${q.optionB != null}">
                        <input class="form-check-input" type="radio"
                               th:name="'answer_' + ${q.questionId}" value="B">
                        <label class="form-check-label">B. <span th:text="${q.optionB}"></span></label>
                    </div>
                    <div class="form-check" th:if="${q.optionC != null}">
                        <input class="form-check-input" type="radio"
                               th:name="'answer_' + ${q.questionId}" value="C">
                        <label class="form-check-label">C. <span th:text="${q.optionC}"></span></label>
                    </div>
                    <div class="form-check" th:if="${q.optionD != null}">
                        <input class="form-check-input" type="radio"
                               th:name="'answer_' + ${q.questionId}" value="D">
                        <label class="form-check-label">D. <span th:text="${q.optionD}"></span></label>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-success mt-2"
                onclick="return confirm('确认提交答卷？提交后不可修改')">
            提交答卷
        </button>
    </form>
</div>
</body>
</html>
