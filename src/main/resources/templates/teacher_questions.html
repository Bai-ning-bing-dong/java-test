<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>题目管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>我的题目</h4>
        <div>
            <button class="btn btn-success btn-sm me-2"
                    onclick="document.getElementById('addForm').style.display='block'">
                + 添加题目
            </button>
            <a href="/teacher/index" class="btn btn-outline-secondary btn-sm">返回首页</a>
        </div>
    </div>

    <!-- 添加题目表单 -->
    <div id="addForm" style="display:none" class="card mb-4">
        <div class="card-body">
            <h6 class="card-title">添加新题目</h6>
            <form method="post" action="/teacher/question/add">
                <div class="mb-2">
                    <label class="form-label">题型</label>
                    <select name="questionType" class="form-select">
                        <option value="1">单选题</option>
                        <option value="3">判断题</option>
                    </select>
                </div>
                <div class="mb-2">
                    <label class="form-label">题干</label>
                    <textarea name="content" class="form-control" rows="2"></textarea>
                </div>
                <div class="row">
                    <div class="col-6 mb-2">
                        <label class="form-label">选项A</label>
                        <input type="text" name="optionA" class="form-control">
                    </div>
                    <div class="col-6 mb-2">
                        <label class="form-label">选项B</label>
                        <input type="text" name="optionB" class="form-control">
                    </div>
                    <div class="col-6 mb-2">
                        <label class="form-label">选项C（可选）</label>
                        <input type="text" name="optionC" class="form-control">
                    </div>
                    <div class="col-6 mb-2">
                        <label class="form-label">选项D（可选）</label>
                        <input type="text" name="optionD" class="form-control">
                    </div>
                </div>
                <div class="row">
                    <div class="col-6 mb-2">
                        <label class="form-label">正确答案（如A或AB）</label>
                        <input type="text" name="correctAnswer" class="form-control">
                    </div>
                    <div class="col-6 mb-2">
                        <label class="form-label">分值</label>
                        <input type="number" name="score" class="form-control" value="10">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">保存题目</button>
                <button type="button" class="btn btn-outline-secondary btn-sm"
                        onclick="document.getElementById('addForm').style.display='none'">
                    取消
                </button>
            </form>
        </div>
    </div>

    <!-- 题目列表 -->
    <table class="table table-bordered table-hover">
        <thead class="table-primary">
        <tr>
            <th>题号</th>
            <th>题型</th>
            <th>题干</th>
            <th>正确答案</th>
            <th>分值</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="q : ${questions}">
            <td th:text="${q.questionId}"></td>
            <td th:text="${q.typeName}"></td>
            <td th:text="${q.content}"></td>
            <td th:text="${q.correctAnswer}"></td>
            <td th:text="${q.score}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(questions)}">
            <td colspan="5" class="text-center text-muted">暂无题目</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
