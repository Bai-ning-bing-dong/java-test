<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的成绩</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>我的成绩单</h4>
        <a href="/student/index" class="btn btn-outline-secondary btn-sm">返回首页</a>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-primary">
        <tr>
            <th>课程名称</th>
            <th>总分</th>
            <th>是否及格</th>
            <th>提交时间</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${results}">
            <td th:text="${r.courseName}"></td>
            <td th:text="${r.totalScore}"></td>
            <td>
                    <span th:text="${r.isPass}"
                          th:class="${r.isPass == '及格'} ? 'badge bg-success' : 'badge bg-danger'">
                    </span>
            </td>
            <td th:text="${r.submittedAt}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(results)}">
            <td colspan="4" class="text-center text-muted">暂无成绩记录</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
