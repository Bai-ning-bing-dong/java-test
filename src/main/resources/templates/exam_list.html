<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>参加考试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>当前可参加的考试</h4>
        <a href="/student/index" class="btn btn-outline-secondary btn-sm">返回首页</a>
    </div>

    <div class="row">
        <div class="col-md-6" th:each="exam : ${exams}">
            <div class="card mb-3">
                <div class="card-body">
                    <h5 class="card-title" th:text="${exam.courseName}"></h5>
                    <p class="card-text text-muted">
                        开始时间：<span th:text="${exam.startTime}"></span><br>
                        考试时长：<span th:text="${exam.duration}"></span> 分钟
                    </p>
                    <a th:href="@{/student/exam/{id}(id=${exam.examId})}"
                       class="btn btn-primary btn-sm">进入考试</a>
                </div>
            </div>
        </div>
        <div class="col-12" th:if="${#lists.isEmpty(exams)}">
            <p class="text-muted">暂无进行中的考试</p>
        </div>
    </div>
</div>
</body>
</html>
