<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>校园在线考试系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .login-box {
            width: 420px;
            margin: 100px auto;
            background: white;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .login-title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #2E5F8A;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="login-title">校园在线考试系统</div>
    <div th:if="${param.error}" class="alert alert-danger">账号或密码错误</div>

    <!-- 角色切换 -->
    <ul class="nav nav-tabs mb-4" id="roleTab">
        <li class="nav-item">
            <a class="nav-link active" id="student-tab" href="#"
               onclick="switchRole('student')">学生登录</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" id="teacher-tab" href="#"
               onclick="switchRole('teacher')">教师登录</a>
        </li>
    </ul>

    <!-- 学生登录表单 -->
    <form id="studentForm" method="post" action="/login">
        <div class="mb-3">
            <label class="form-label">学号</label>
            <input type="text" name="studentId" class="form-control" placeholder="请输入学号">
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input type="password" name="password" class="form-control" placeholder="请输入密码">
        </div>
        <button type="submit" class="btn btn-primary w-100">登录</button>
    </form>

    <!-- 教师登录表单 -->
    <form id="teacherForm" method="post" action="/teacher/login" style="display:none">
        <div class="mb-3">
            <label class="form-label">教师工号</label>
            <input type="text" name="teacherId" class="form-control" placeholder="请输入工号">
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input type="password" name="password" class="form-control" placeholder="请输入密码">
        </div>
        <button type="submit" class="btn btn-success w-100">登录</button>
    </form>
</div>

<script>
    function switchRole(role) {
        if (role === 'student') {
            document.getElementById('studentForm').style.display = 'block';
            document.getElementById('teacherForm').style.display = 'none';
            document.getElementById('student-tab').classList.add('active');
            document.getElementById('teacher-tab').classList.remove('active');
        } else {
            document.getElementById('studentForm').style.display = 'none';
            document.getElementById('teacherForm').style.display = 'block';
            document.getElementById('teacher-tab').classList.add('active');
            document.getElementById('student-tab').classList.remove('active');
        }
    }
</script>
</body>
</html>
